services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  # Accessible externally on :5432 for Tableau Desktop connections.
  postgres:
    image: postgres:16-alpine
    container_name: snies_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: snies_db
      POSTGRES_USER: snies
      POSTGRES_PASSWORD: snies
    ports:
      - "5432:5432"      # Tableau connects to localhost:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql   # schema bootstrap
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snies -d snies_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Servidor Prefect ───────────────────────────────────────────────────────
  # Proporciona una interfaz web en http://localhost:4200
  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: snies_prefect
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      - PREFECT_API_DATABASE_CONNECTION_URL=sqlite+aiosqlite:////tmp/prefect.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Pipeline ───────────────────────────────────────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snies_pipeline
    depends_on:
      postgres:
        condition: service_healthy
      prefect-server:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://snies:snies@postgres:5432/snies_db
      - PREFECT_API_URL=http://prefect-server:4200/api
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
    driver: local
